networks:
  app-rede:
    driver: bridge

volumes:
  rabbitmq-data:
  mongo-data:

services:
  mongo:
    image: mongo:7
    container_name: mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    volumes:
      - mongo-data:/data/db
    networks:
      - app-rede
    ports:
      - "27018:27018"
    restart: unless-stopped
    healthcheck:
      test: >
        mongosh --port 27018 --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27018'}]}) }"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=user-tsi
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-rede
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
